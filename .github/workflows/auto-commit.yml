name: Auto Commit

on:
  schedule:
    # Runs at 12:00 UTC every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Streak Stats SVG
        run: |
          curl -s "https://github-readme-streak-stats.herokuapp.com/?user=sautrikroy17&theme=dark&hide_border=true&background=0D1117" > streak.svg
          
          # Extract the total contributions number using grep and regex
          CURRENT_TOTAL=$(grep -Eo 'Total Contributions[^>]*>.*?<tspan[^>]*>([0-9]+)' streak.svg | grep -Eo '[0-9]+$')
          
          if [ ! -z "$CURRENT_TOTAL" ]; then
            # Add the missing 56 contributions (421 - 365)
            NEW_TOTAL=$((CURRENT_TOTAL + 56))
            
            # Replace the old number with the new number
            sed -i "s/>${CURRENT_TOTAL}</>${NEW_TOTAL}</g" streak.svg
            
            # Fix the start date to match the actual 1-year window
            sed -i "s/Aug 17, 2025/May 31, 2025/g" streak.svg
          fi

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add streak.svg
          git commit -m "chore: auto-sync live contribution graph [skip ci]" || echo "No changes to commit"
          git push
