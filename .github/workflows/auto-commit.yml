name: Auto Commit

on:
  schedule:
    # Runs at 12:00 UTC every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config --global user.name "sautrikroy17"
          git config --global user.email "sautrikroy2006@gmail.com"
          curl -s "https://github-readme-streak-stats.herokuapp.com/?user=sautrikroy17&theme=dark&hide_border=true&background=0D1117" > streak.svg
          echo "Automated daily commit" >> .dummy
          git add .dummy streak.svg
          git commit -m "chore: auto-sync live contribution graph [skip ci]" || echo "No changes to commit"
          git push
