name: Auto Commit

on:
  schedule:
    # Runs at 12:00 UTC every day
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update dummy file
        run: |
          echo "Last auto-commit: $(date)" > auto-commit.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add auto-commit.txt
          git commit -m "chore: auto-update contribution graph [skip ci]" || echo "No changes to commit"
          git push
