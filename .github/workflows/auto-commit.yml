name: Daily Activity Sync

on:
  schedule:
    # Runs at 06:00 UTC (11:30 AM IST) every single day
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate stats and commit
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "sautrikroy17"
          git config --global user.email "sautrikroy2006@gmail.com"

          # ── 1. Download the exact official Demolab SVG ──
          curl -s "https://streak-stats.demolab.com/?user=sautrikroy17&theme=dark&hide_border=true&background=0D1117" > github-stats.svg

          # ── 2. Commit the daily log + new stats SVG ──
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          echo "[$TIMESTAMP] Activity synced." >> activity_metrics.log

          git add github-stats.svg activity_metrics.log
          git commit -m "sync: daily stats update — official streak card" || echo "No changes"
          git push origin main
