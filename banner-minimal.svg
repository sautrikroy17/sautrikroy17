<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Clean, stark minimalism */
      .name { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif; font-weight: 800; font-size: 58px; fill: #171717; letter-spacing: -1.5px; }
      .role { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-weight: 500; font-size: 20px; fill: #404040; letter-spacing: 1px; }
      
      /* The code font they explicitly loved */
      .code-line { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 13px; fill: #A1A1AA; }
      .code-keyword { fill: #c678dd; } 
      .code-string { fill: #98c379; } 
      .code-func { fill: #61afef; }
      
      /* Right side text */
      .right-text { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-weight: 700; font-size: 26px; fill: #ffffff; text-anchor: middle; }
    </style>
  </defs>

  <!-- 1. Left Side: Minimalist Cream Background -->
  <rect width="100%" height="100%" fill="#F1F0E8" />

  <!-- 2. Middle: Sharp Dark Diagonal -->
  <path d="M 550 0 L 1000 0 L 1000 300 L 350 300 Z" fill="#181818" />

  <!-- 3. Right: Sharp Accent Diagonal (Vibrant Developer Indigo) -->
  <path d="M 820 0 L 1000 0 L 1000 300 L 700 300 Z" fill="#4F46E5" />

  <!-- Typography Content (Cream area) -->
  <g transform="translate(70, 140)">
    <text x="0" y="0" class="name">Sautrik Roy</text>
    <text x="4" y="35" class="role">Developer ✦ AI Engineer</text>
  </g>

  <!-- Middle Minimalist Accents (White scribbles/stars on dark background like screenshot) -->
  <g transform="translate(580, 80)" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clean Minimalist Star -->
    <path d="M 0 -15 Q 0 0 15 0 Q 0 0 0 15 Q 0 0 -15 0 Q 0 0 0 -15 Z" fill="#ffffff" stroke="none" opacity="0.9" />
    
    <!-- Abstract Code Brackets -->
    <path d="M 50 40 L 35 55 L 50 70" opacity="0.6"/>
    <path d="M 70 40 L 85 55 L 70 70" opacity="0.6"/>
  </g>

  <!-- The Code Lines (Positioned cleanly in the dark area) -->
  <g transform="translate(400, 240)">
    <text x="0" y="0" class="code-line"><tspan class="code-keyword">const</tspan> mission = <tspan class="code-string">"Building highly scalable systems"</tspan>;</text>
    <text x="0" y="24" class="code-line"><tspan class="code-keyword">while</tspan> (alive) { <tspan class="code-func">code</tspan>(); <tspan class="code-func">create</tspan>(); <tspan class="code-func">optimize</tspan>(); }</text>
  </g>

  <!-- Right Typography (Indigo area) -->
  <g transform="translate(870, 150)">
    <text x="0" y="0" class="right-text">Where code</text>
    <text x="0" y="35" class="right-text">meets creativity.</text>
  </g>

</svg>
