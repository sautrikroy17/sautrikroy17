<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <style>
      @keyframes spin-ring {
        0% { stroke-dashoffset: 220; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes pulse-flame {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.08); }
      }
      @keyframes fade-in {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      .ring { animation: spin-ring 2s ease-out forwards; }
      .flame { animation: pulse-flame 3s ease-in-out infinite; transform-origin: 350px 100px; }
      .fade { animation: fade-in 1.5s ease-out forwards; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="200" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="698" height="198" rx="11" fill="none" stroke="#30363D" stroke-width="1.5"/>

  <!-- LEFT: Total Contributions -->
  <g class="fade">
    <text x="160" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="46" fill="#E6EDF3" text-anchor="middle">686</text>
    <text x="160" y="118" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="500" font-size="13" fill="#8B949E" text-anchor="middle">Total Contributions</text>
    <text x="160" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="400" font-size="11" fill="#3FB950" text-anchor="middle">Jun 3, 2025 - Present</text>
  </g>

  <!-- Separator -->
  <line x1="300" y1="40" x2="300" y2="160" stroke="#30363D" stroke-width="1"/>

  <!-- CENTER: Current Streak with animated ring -->
  <g transform="translate(350, 100)">
    <!-- Background ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="#30363D" stroke-width="8"/>
    <!-- Animated orange progress ring -->
    <circle class="ring" cx="0" cy="0" r="55" fill="none" stroke="#F78166" stroke-width="8"
      stroke-dasharray="220 220" stroke-dashoffset="220"
      stroke-linecap="round" transform="rotate(-90)"/>
    <!-- Flame emoji center -->
    <text class="flame" x="0" y="-8" font-size="26" text-anchor="middle">🔥</text>
    <!-- Streak number -->
    <text x="0" y="24" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="22" fill="#F78166" text-anchor="middle">76</text>
  </g>
  <!-- Current Streak label -->
  <text x="350" y="165" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="600" font-size="13" fill="#8B949E" text-anchor="middle">Current Streak</text>
  <text x="350" y="182" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="400" font-size="11" fill="#F78166" text-anchor="middle">Mar 21 - Jun 3</text>

  <!-- Separator -->
  <line x1="400" y1="40" x2="400" y2="160" stroke="#30363D" stroke-width="1"/>

  <!-- RIGHT: Longest Streak -->
  <g class="fade">
    <text x="550" y="90" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="46" fill="#E6EDF3" text-anchor="middle">76</text>
    <text x="550" y="118" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="500" font-size="13" fill="#8B949E" text-anchor="middle">Longest Streak</text>
    <text x="550" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="400" font-size="11" fill="#3FB950" text-anchor="middle">Mar 21 - Jun 3</text>
  </g>
</svg>
