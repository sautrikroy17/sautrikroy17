<svg width="700" height="200" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="200" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="698" height="198" rx="11" fill="none" stroke="#30363D" stroke-width="1.5"/>

  <!-- LEFT: Total Contributions -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0s" fill="freeze"/>
    <text x="160" y="88" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="48" fill="#E6EDF3" text-anchor="middle">686</text>
    <text x="160" y="115" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="500" font-size="13" fill="#8B949E" text-anchor="middle">Total Contributions</text>
    <text x="160" y="135" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="400" font-size="11" fill="#3FB950" text-anchor="middle">Jun 3, 2025 - Present</text>
  </g>

  <!-- Left separator -->
  <line x1="300" y1="40" x2="300" y2="160" stroke="#30363D" stroke-width="1"/>

  <!-- CENTER ring background -->
  <circle cx="350" cy="95" r="58" fill="none" stroke="#21262D" stroke-width="10"/>

  <!-- CENTER animated ring (draws itself) -->
  <circle cx="350" cy="95" r="58" fill="none" stroke="#F78166" stroke-width="10"
    stroke-dasharray="364.4" stroke-dashoffset="364.4"
    stroke-linecap="round"
    transform="rotate(-90 350 95)">
    <animate attributeName="stroke-dashoffset"
      from="364.4" to="0"
      dur="1.8s" begin="0.2s"
      fill="freeze"/>
  </circle>

  <!-- Flame icon (floats up/down) -->
  <g transform="translate(350, 78)">
    <animateTransform attributeName="transform" type="translate"
      values="350,78; 350,74; 350,78"
      dur="2.5s" repeatCount="indefinite"/>
    <text x="0" y="0" font-size="22" text-anchor="middle">🔥</text>
  </g>

  <!-- Streak number inside ring -->
  <text x="350" y="108" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="800" font-size="22" fill="#F78166" text-anchor="middle" opacity="0">
    76
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/>
  </text>

  <!-- Current Streak label below ring -->
  <text x="350" y="168" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="600" font-size="13" fill="#8B949E" text-anchor="middle" opacity="0">
    Current Streak
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
  </text>
  <text x="350" y="184" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-weight="400" font-size="11" fill="#F78166" text-anchor="middle" opacity="0">
    Mar 21 - Jun 3
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
  </text>

  <!-- Right separator -->
  <line x1="400" y1="40" x2="400" y2="160" stroke="#30363D" stroke-width="1"/>

  <!-- RIGHT: Longest Streak -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" begin="0.4s" fill="freeze"/>
    <text x="550" y="88" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="48" fill="#E6EDF3" text-anchor="middle">76</text>
    <text x="550" y="115" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="500" font-size="13" fill="#8B949E" text-anchor="middle">Longest Streak</text>
    <text x="550" y="135" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="400" font-size="11" fill="#3FB950" text-anchor="middle">Mar 21 - Jun 3</text>
  </g>
</svg>
