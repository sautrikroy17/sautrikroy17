<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="50%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Vibrant Gradient for text -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#a1a1aa" />
    </linearGradient>

    <!-- Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="1" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Animations -->
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 800; font-size: 64px; fill: url(#text-grad); }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 500; font-size: 20px; fill: #a1a1aa; letter-spacing: 2px; text-transform: uppercase; }
      .quote { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; font-weight: 400; font-size: 14px; fill: #71717a; }
      
      /* Floating animation for shapes */
      @keyframes float1 {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(-20px, -20px) rotate(5deg); }
      }
      @keyframes float2 {
        0%, 100% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(20px, 15px) rotate(-5deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.05); }
      }
      .shape-1 { animation: float1 15s ease-in-out infinite; transform-origin: center; }
      .shape-2 { animation: float2 20s ease-in-out infinite; transform-origin: center; }
      .glow-blob { animation: pulse 8s ease-in-out infinite; transform-origin: center; }
    </style>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="16" />
  
  <!-- Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.6" rx="16" />

  <!-- Animated Glowing Orbs -->
  <circle cx="850" cy="80" r="120" fill="#3b82f6" opacity="0.3" filter="url(#glow)" class="glow-blob" />
  <circle cx="950" cy="220" r="100" fill="#8b5cf6" opacity="0.3" filter="url(#glow)" class="glow-blob" style="animation-delay: -4s;" />

  <!-- Abstract Geometrics (Right Side) -->
  <g class="shape-1" opacity="0.8">
    <path d="M 650 0 L 1000 350 L 1000 0 Z" fill="#18181b" opacity="0.7" />
    <path d="M 720 0 L 1000 280 L 1000 0 Z" fill="url(#accent-grad)" opacity="0.15" />
    <!-- Tech/Code visual element -->
    <path d="M 800 120 L 820 100 L 850 100" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="850" cy="100" r="4" fill="#60a5fa" />
    
    <path d="M 820 180 L 840 200 L 880 200" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="880" cy="200" r="4" fill="#a78bfa" />
  </g>

  <g class="shape-2">
    <!-- Star / Sparkle element -->
    <path d="M 680 80 Q 700 80 700 60 Q 700 80 720 80 Q 700 80 700 100 Q 700 80 680 80 Z" fill="#ffffff" opacity="0.8" />
    <path d="M 880 60 Q 890 60 890 50 Q 890 60 900 60 Q 890 60 890 70 Q 890 60 880 60 Z" fill="#ffffff" opacity="0.5" />
    
    <!-- Abstract wavy line -->
    <path d="M 750 250 Q 780 200 820 250 T 890 250" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.2" />
  </g>

  <!-- Typography Content -->
  <g transform="translate(70, 130)">
    <!-- Main Name -->
    <text x="0" y="0" class="title">Sautrik Roy</text>
    
    <!-- Subtitle -->
    <text x="5" y="45" class="subtitle">Developer ✦ AI Engineer</text>
    
    <!-- Subtle separator -->
    <rect x="5" y="70" width="60" height="4" fill="url(#accent-grad)" rx="2" />
    
    <!-- Code-like Quote -->
    <text x="5" y="110" class="quote">const mission = "Building intelligent, highly scalable systems";</text>
    <text x="5" y="130" class="quote">while (alive) { code(); create(); optimize(); }</text>
  </g>

</svg>
