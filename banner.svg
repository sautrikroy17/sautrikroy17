<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Obsidian Base -->
    <rect id="bg" width="100%" height="100%" fill="#030303" />

    <!-- Aurora Glowing Orbs (Premium Tech Aesthetic) -->
    <radialGradient id="aurora-1" cx="0%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#030303" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-2" cx="100%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#030303" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-3" cx="80%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#030303" stop-opacity="0" />
    </radialGradient>

    <!-- Premium Metallic Gradients -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#D97706" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <!-- Minimalist Precision Dot Grid -->
    <pattern id="premium-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.5" fill="#ffffff" fill-opacity="0.04" />
    </pattern>

    <style>
      .name { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif; font-weight: 800; font-size: 86px; fill: url(#silver-grad); letter-spacing: -2.5px; }
      .role { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; font-weight: 600; font-size: 22px; fill: #A1A1AA; letter-spacing: 12px; text-transform: uppercase; }
      .tagline { font-family: 'Playfair Display', 'Georgia', serif; font-style: italic; font-size: 38px; fill: #E4E4E7; letter-spacing: 1px; }
      
      /* Code font styling */
      .code-tag { font-family: 'SFMono-Regular', 'JetBrains Mono', monospace; font-style: normal; font-weight: 600; fill: #38BDF8; font-size: 34px; letter-spacing: -1px; }
      
      /* Creativity font styling */
      .creative-tag { fill: url(#gold-grad); font-weight: bold; }
      
      /* Smooth Aurora Animations */
      @keyframes float-slow { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-30px, 20px); } }
      @keyframes float-med { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(20px, -30px); } }
      
      .aurora-1 { animation: float-slow 22s ease-in-out infinite; transform-origin: top left; }
      .aurora-2 { animation: float-med 28s ease-in-out infinite; transform-origin: bottom right; }
      
      /* Subtle rotation for abstract shapes */
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .spin-slow { animation: spin 60s linear infinite; transform-origin: center; }
      .spin-reverse { animation: spin 80s linear infinite reverse; transform-origin: center; }
    </style>
  </defs>

  <!-- Deep Base -->
  <rect width="100%" height="100%" fill="#030303" rx="24" />
  
  <!-- Aurora Glows -->
  <g opacity="0.85">
    <rect class="aurora-1" width="120%" height="120%" x="-10%" y="-10%" fill="url(#aurora-1)" />
    <rect class="aurora-2" width="120%" height="120%" x="-10%" y="-10%" fill="url(#aurora-2)" />
    <rect width="100%" height="100%" fill="url(#aurora-3)" />
  </g>

  <!-- Precision Dot Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#premium-grid)" rx="24" />

  <!-- Elegant Geometric Accents (Right Side) -->
  <g transform="translate(950, 200)">
    <g class="spin-slow">
      <circle cx="0" cy="0" r="140" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.08" stroke-dasharray="4 12" />
      <circle cx="0" cy="0" r="180" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-opacity="0.2" />
      <circle cx="180" cy="0" r="4" fill="url(#gold-grad)" opacity="0.6" />
    </g>
    <g class="spin-reverse">
      <circle cx="0" cy="0" r="100" fill="none" stroke="#38BDF8" stroke-width="1" stroke-opacity="0.15" />
      <path d="M 0 -100 L 0 -110 M 0 100 L 0 110 M -100 0 L -110 0 M 100 0 L 110 0" stroke="#38BDF8" stroke-width="2" stroke-opacity="0.4" />
    </g>
  </g>

  <!-- Main Typography Content -->
  <g transform="translate(100, 170)">
    <!-- High-end uppercase role -->
    <text x="5" y="-55" class="role">Software Engineer</text>
    
    <!-- Massive Silver Name -->
    <text x="0" y="45" class="name">Sautrik Roy</text>
    
    <!-- Premium Tagline -->
    <g transform="translate(5, 125)">
      <text x="0" y="0" class="tagline">Where <tspan class="code-tag">&lt;code/&gt;</tspan> meets <tspan class="creative-tag">creativity.</tspan></text>
    </g>
  </g>

  <!-- Premium Brushed Gold Accent Line -->
  <rect x="105" y="335" width="100" height="4" fill="url(#gold-grad)" rx="2" />

  <!-- Subtle Light Leaks -->
  <path d="M 0 0 L 1200 0 L 1200 2 M 0 0" fill="#ffffff" opacity="0.05" />
  <path d="M 0 0 L 2 0 L 2 400 M 0 0" fill="#ffffff" opacity="0.05" />
</svg>
